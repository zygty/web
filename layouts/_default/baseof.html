<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Site.Title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
    <header>
        <div class="logo">
            <a href="{{ .Site.BaseURL }}">
                <img src="{{ "images/logo.png" | relURL }}" alt="Logo">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="{{ .Site.BaseURL }}">主页</a></li>
                <li><a href="{{ "/map/" | relURL }}">航空地图</a></li>
                <li><a href="{{ "/assignment1/" | relURL }}">Assignment 1</a></li>
                <li><a href="{{ "/assignment2/" | relURL }}">Assignment 2</a></li>
                <li><a href="{{ "/assignment3/" | relURL }}">Assignment 3</a></li>
                <li><a href="{{ "/assignment4/" | relURL }}">Assignment 4</a></li>
            </ul>
        </nav>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        <p>&copy; 2026 {{ .Site.Title }}. All rights reserved.</p>
    </footer>
</body>
</html>
